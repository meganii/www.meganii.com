<!DOCTYPE html>
<html ⚡="">
{{ partial "head.html" . }}

<body>
  <amp-auto-ads type="adsense" data-ad-client="{{.Site.Params.adsensePublisher}}"></amp-auto-ads>

  {{ if ne (getenv "HUGO_ENV") "DEV" }}
    {{ with .Site.Params.GoogleAnalytics }}
      {{ partial "analytics.html" . }}
    {{ end }}
  {{ end }}

  {{ partial "header.html" . }}

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  <aside>
    {{ block "aside" . }}{{ end }}
  </aside>

  {{ partial "footer.html" . }}

</body>

</html>
