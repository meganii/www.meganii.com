{{ $baseurl := "https://www.meganii.com/" }}
{{ $src := .Get "src" }}

{{ range .Site.Pages }}
  {{ if eq $src (add $baseurl (.URL | replaceRE "^/" "")) }}
<div class="embed-wrapper">
  <div class="embed-wrapper-inner">
    <div class="embed-content">
      <div class="thumb-wrapper"><amp-img src="{{ .Params.img }}" width="100" height="100" lauout="responsive" /></div>
      <div class="entry-body">
        <div class="entry-title"><a href="{{ .URL }}">{{ .Title }}</a></div>
        <div class="entry-content">{{ .Summary }}</div>
      </div>
    </div>
  </div>
</div>
  {{ end }}
{{ end }}
