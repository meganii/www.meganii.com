{{ $id := .Get "id" }}
{{ $width := .Get "width" }}
{{ $height := .Get "height" }}

<amp-iframe
  width="{{ $width }}"
  height="{{ $height }}"
  sandbox="allow-scripts allow-same-origin allow-popups allow-presentation"
  layout="responsive"
  frameborder="0"
  src="https://www.youtube.com/embed/{{$id}}">
</amp-iframe>
